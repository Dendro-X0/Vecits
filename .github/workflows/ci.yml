name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    name: Client + protocol readiness
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies (Tauri cargo check)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: ./.github/actions/setup-vectis-build

      - name: Run CI readiness bundle
        run: npm run ci:readiness

  docker-smoke:
    name: Docker node smoke (RDG-4)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Docker compose smoke
        run: npm run v1:docker-smoke
